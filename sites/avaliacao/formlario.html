<!DOCTYPE html>

<body>

    <header>

        <br>
        <p class="w">O evento escolar deste ano (2026) irá ser uma Feira de Técnologias. Nela iremos apresentar as atividades dos alunos, além de palestras e diverssas atividades.</p>
    </header>

    <h2>Formulário de Inscrição:</h2>
    <form action="submit_form.php" method="post">
        <label for="nome">Nome Completo:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">Email:</label><br>

        <input type="text" id="nome" name="nome" required><br><br>
